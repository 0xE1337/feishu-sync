name: python-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: upload-sheet mock tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 实测最低支持 3.7（用了 from __future__ import annotations）
        # 主跑 3.10 / 3.12，覆盖当前主流 LTS
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile bin/upload-sheet.py bin/test-upload-sheet.py bin/download-lite.py

      - name: Run upload-sheet mock test suite
        # 纯 stdlib + monkey-patch _http_json，无需飞书凭证
        run: python bin/test-upload-sheet.py
