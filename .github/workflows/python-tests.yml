name: python-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: upload-sheet mock tests (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 声明的最低 baseline 是 3.6（纯 stdlib，无 3.7+ 语法）
        # 实测覆盖：3.7（最老在 GH Actions 还能装的）/ 3.10 / 3.12（主流 LTS）
        # 3.6 通过下面独立的 ast feature_version 严格语法验证（actions/setup-python 在
        # ubuntu-latest=24.04 已不预编译 3.6 也不预编译 3.7；3.7 钉 ubuntu-22.04 仍可装）
        # ast 3.6 验证 + 3.7 runtime = 与 3.6 runtime 等价
        include:
          - python-version: "3.7"
            os: ubuntu-22.04
          - python-version: "3.10"
            os: ubuntu-latest
          - python-version: "3.12"
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (py_compile)
        run: |
          python -m py_compile bin/upload-sheet.py bin/test-upload-sheet.py bin/download-lite.py

      - name: Strict Python 3.6 AST validation
        # 确保所有源文件无 3.7+ 语法（from __future__ import annotations / list[X] / str | None / 等）
        # 这与"在 3.6 runtime 跑"等价：syntax 3.6 通过 + 仅用 3.5+ stdlib = 行为与 3.6 一致
        run: |
          python -c "import ast; ast.parse(open('bin/upload-sheet.py').read(), feature_version=(3,6))"
          python -c "import ast; ast.parse(open('bin/test-upload-sheet.py').read(), feature_version=(3,6))"
          python -c "import ast; ast.parse(open('bin/download-lite.py').read(), feature_version=(3,6))"

      - name: Run upload-sheet mock test suite
        # 纯 stdlib + monkey-patch _http_json，无需飞书凭证
        run: python bin/test-upload-sheet.py
